<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodingLab Header</title>


<script src="https://kit.fontawesome.com/9167b9376e.js" crossorigin="anonymous"></script>


  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    <div class="logo">CodingLab</div>

    <div class="search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search here...">
    </div>

    <div class="close">
      <i class="fa-solid fa-xmark"></i>
    </div>
  </div>

</body>
</html>
