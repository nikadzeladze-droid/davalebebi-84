<html>
<head>
<title>Simple Login Form</title>
</head>
<body>
<form>
<label>Username:</label>
<input type="text">
<br><br>


<label>Password:</label>
<input type="password">
<br><br>


<label>City of <br> Employment:</label>
<input type="text">
<br><br>


<label>Web server:</label>
<select>
<option>--HTML--</option>
<option>css</option>
<option>PHYTON</option>
<option>java</option>
</select>
<br><br>


<p>Please specify your role:</p>
<input type="radio" name="role" > Admin<br>

<input type="radio" name="role"> Engineer<br>
<input type="radio" name="role"> Manager<br>


<input type="radio" name="role"> Guest<br><br>


<p>Single sign-on to the following:</p>
<input type="checkbox"> Mail<br>


<input type="checkbox"> Payroll<br>

<input type="checkbox"> Self-service<br><br>


<button type="submit">Login</button>
<button type="reset">Reset</button>
</form>
</body>
</html>
