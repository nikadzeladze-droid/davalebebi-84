<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<table class="list-table">
    <tr>
        <td class="number">1</td>
        <td class="text">List item</td>
    </tr>
    <tr>
        <td class="number">2</td>
        <td class="text">List item</td>
    </tr>
    <tr>
        <td class="number">3</td>
        <td class="text">List item</td>
    </tr>


    <tr>
        <td class="empty" rowspan="2"></td>
        <td class="sub">
            <span class="number">1</span> List sub item
        </td>
    </tr>
    <tr>
        <td class="sub">
            <span class="number">2</span> List sub item
        </td>
    </tr>
</table>

</body>
</html>
