<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>
    <link rel="stylesheet" href="hw2.css">
</head>
<body>

<div class="contact">
    <h1 class="title">Get in Touch</h1>
    <p class="stitle">
        Fill out the form below and we'll get back to you as soon as possible.
    </p>

    <form class="form">

        <label class="label">Name</label>
        <input class="field" type="text" placeholder="Your name">

        <label class="label">Email</label>
        <input class="field" type="email" placeholder="Your email">

        <label class="label">Phone</label>
        <input class="field" type="text" placeholder="+1 (234) 56789">

        <label class="label">Message</label>
        <textarea class="field area" placeholder="Your message"></textarea>

        <button class="btt">Send Message</button>

    </form>
</div>

</body>
</html>
