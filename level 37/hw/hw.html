
<!-- 1)

id selector:
გამოიყენება მხოლოდ ერთი უნიკალური ელემენტისთვის.
ერთ გვერდზე ერთი და იგივე id არ უნდა განმეორდეს.

class selector:
გამოიყენება რამდენიმე ელემენტისთვის.
ერთი class შეიძლება ბევრ ელემენტს ჰქონდეს. -->



<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nika">
    <h1 class="mafia">But</h1>

    <button class="boss">Button 1</button>
    <button class="boss">Button 2</button>
    <button class="boss">Button 3</button>

    <button id="zangi">Button 4</button>

    <button>Button 5</button>
</div>

<hr>

<div class="nika">
    <h1 class="mafia">tuff king</h1>

    <div class="boss">
        <h1 class="mafia">boss1</h1>
        <p class="mafia">tuff.</p>
    </div>

    <div class="boss">
        <h1 class="mafia">mafia</h1>
        <p class="mafia">nikatuff.</p>
    </div>

    <div class="boss" id="zangi">
        <h1 class="mafia">git hub chempioni var</h1>
        <p class="mafia">var</p>
    </div>
</div>

<hr>

<div class="nika">
    <h1 class="mafia">Georgia</h1>

    <div class="boss">
        <h1 class="mafia">თბილისი</h1>
        <p class="mafia">საქართველო</p>
    </div>

    <div class="boss">
        <h1 class="mafia">hitler</h1>
        <p class="mafia">tuff</p>
    </div>

    <div class="boss">
        <h1 class="mafia">mona</h1>
        <p class="mafia">sigma</p>
    </div>
</div>

</body>
</html>
