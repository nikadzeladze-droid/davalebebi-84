
<!--
Inline CSS:
სტილი იწერება პირდაპირ HTML თეგში style ატრიბუტის გამოყენებით.


Internal CSS:
სტილი იწერება <style> თეგში, რომელიც მოთავსებულია <head> ნაწილში.

განსხვავება:
1. Inline მოქმედებს მხოლოდ ერთ ელემენტზე.
2. Internal მოქმედებს ბევრ ელემენტზე ერთდროულად.
3. Inline გამოიყენება მცირე ცვლილებებისთვის.
4. Internal გამოიყენება მთლიანი გვერდის გასასტილად.
-->

<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS</title>
</head>
<body>

<p style="color:red; font-size:20px; background:yellow;">
პირველი პარაგრაფი
</p>

<p style="color:blue; text-align:center; border:2px solid black;">
მეორე პარაგრაფი
</p>

<p style="color:green; font-family:Arial; padding:15px;">
მესამე პარაგრაფი
</p>

<p style="background:gray; color:white; margin:20px;">
მეოთხე პარაგრაფი
</p>

</body>
</html>
