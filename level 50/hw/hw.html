 <!-- flex-direction განსაზღვრავს ელემენტები რა მიმართულებით განლაგდეს -->
  <!-- justify-contentაკონტროლებს ელემენტების განლაგებას მთავარი ღერძის  გასწვრივ -->
   <!-- align-items აკონტროლებს x განლაგებას ღერძზე -->
    <!-- gap ამატებს დაშორებას flex items-ს შორის -->
